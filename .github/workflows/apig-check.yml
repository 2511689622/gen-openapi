# PR check: ensure apig/openAPI.yaml stays in sync with apig/api-contract.yaml
# and apig/apig-config.yaml in the same service repo.
#
# Drop this file into each service repo at .github/workflows/apig-check.yml.
#
# Required layout in the consuming repo:
#   apig/api-contract.yaml
#   apig/apig-config.yaml
#   apig/openAPI.yaml
name: apig-check

on:
  pull_request:
    # GitHub does not support variables in branch filters. Keep the branch list
    # aligned with your rollout target. For production, remove test branches.
    branches:
      - main
      - master
      - feature/init_openapi
    paths:
      - 'apig/**'
      - '**/*.go'
      - '**/*.java'
      - '**/*.py'
      - '.github/workflows/apig-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Checkout gen-openapi tool
        uses: actions/checkout@v4
        with:
          repository: 2511689622/gen-openapi
          ref: main
          path: gen-openapi
          token: ${{ secrets.GEN_OPENAPI_TOKEN || github.token }}

      - name: Install gen-openapi
        working-directory: gen-openapi
        run: go install .

      - name: Render OpenAPI
        run: |
          gen-openapi render \
            --contract    apig/api-contract.yaml \
            --apig-config apig/apig-config.yaml \
            --out         /tmp/openAPI.rendered.yaml

      - name: Validate rendered OpenAPI
        run: gen-openapi validate /tmp/openAPI.rendered.yaml

      - name: Check committed openAPI.yaml is in sync
        run: |
          gen-openapi check \
            --contract    apig/api-contract.yaml \
            --apig-config apig/apig-config.yaml \
            --output      apig/openAPI.yaml
