name: apig-drift-scan

on:
  schedule:
    - cron: '17 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    uses: 2511689622/gen-openapi/.github/workflows/reusable-apig-drift-scan.yml@main
    with:
      target_branch: feature/init_openapi
      gen_openapi_ref: main
      detect_mode: static
      detect_lang: go
      detect_framework: gin
    secrets:
      github_token: ${{ secrets.GH_TOKEN }}
      gen_openapi_token: ${{ secrets.GEN_OPENAPI_TOKEN }}
