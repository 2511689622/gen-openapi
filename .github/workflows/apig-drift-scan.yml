# Weekly drift scan: rerun discovery against the target branch source tree,
# diff against apig/api-contract.yaml, and create a reviewed PR when they
# disagree. Auto-merge is intentionally NOT performed.
#
# Drop this file into each service repo at .github/workflows/apig-drift-scan.yml.
#
# Test rollout target branch: feature/init_openapi.
# Production rollout: replace TARGET_BRANCH with the real default branch.
name: apig-drift-scan

on:
  schedule:
    - cron: '17 2 * * 1' # weekly on Monday at 02:17 UTC; schedule runs from default branch only
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: feature/init_openapi
      DETECT_MODE: static
      DETECT_LANG: go
      DETECT_FRAMEWORK: gin
      DETECT_OPENAPI_URL: ''
      DETECT_BASE_URL: ''
    steps:
      - name: Checkout service repo target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Checkout gen-openapi tool
        uses: actions/checkout@v4
        with:
          repository: 2511689622/gen-openapi
          ref: main
          path: gen-openapi
          token: ${{ secrets.GEN_OPENAPI_TOKEN || github.token }}

      - name: Install gen-openapi
        working-directory: gen-openapi
        run: go install .

      - name: Discover routes from source
        run: |
          args=(
            --mode      "$DETECT_MODE"
            --lang      "$DETECT_LANG"
            --framework "$DETECT_FRAMEWORK"
            --source    .
            --service   "${{ github.event.repository.name }}"
            --out       /tmp/api-contract.detected.yaml
          )
          if [ -n "$DETECT_OPENAPI_URL" ]; then
            args+=(--openapi-url "$DETECT_OPENAPI_URL")
          fi
          if [ -n "$DETECT_BASE_URL" ]; then
            args+=(--base-url "$DETECT_BASE_URL")
          fi
          gen-openapi discover "${args[@]}"

      - name: Diff candidate against canonical contract
        id: diff
        run: |
          set +e
          gen-openapi diff \
            --contract apig/api-contract.yaml \
            --detected /tmp/api-contract.detected.yaml \
            --out      /tmp/diff.md
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload diff artifact
        if: steps.diff.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-drift
          path: /tmp/diff.md

      - name: Configure git author
        if: steps.diff.outputs.drift == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create reviewed drift PR
        if: steps.diff.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gen-openapi pr \
            --contract    apig/api-contract.yaml \
            --detected    /tmp/api-contract.detected.yaml \
            --apig-config apig/apig-config.yaml \
            --openapi     apig/openAPI.yaml \
            --base        "$TARGET_BRANCH" \
            --branch      "gen-openapi/api-contract-drift-${{ github.run_id }}-${{ github.run_attempt }}" \
            --title       "Update API contract from detected drift"
