name: apig-deploy

on:
  push:
    branches:
      - main
      - master
      - feature/init_openapi
    paths:
      - 'apig/api-contract.yaml'
      - 'apig/apig-config.yaml'
      - 'apig/openAPI.yaml'
      - '.github/workflows/apig-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: 2511689622/gen-openapi/.github/workflows/reusable-apig-deploy.yml@main
    with:
      gen_openapi_ref: main
      dry_run_enabled: true
      import_enabled: true
      catalog_path: gen-openapi/catalog/catalog.yaml
    secrets:
      huaweicloud_ak: ${{ secrets.HUAWEICLOUD_SDK_AK }}
      huaweicloud_sk: ${{ secrets.HUAWEICLOUD_SDK_SK }}
      gen_openapi_token: ${{ secrets.GEN_OPENAPI_TOKEN }}
