apiVersion: infra.example.com/v1
kind: ApiCatalog
metadata:
  name: infrastructure-api-catalog
  description: Central index of service-owned API contracts and APIG OpenAPI artifacts.
spec:
  services:
    - name: software-package-server
      title: Software Package Server API
      owner: infra-package-team
      language: go
      lifecycle: production
      repo: https://github.com/opensourceways/software-package-server.git
      defaultBranch: main
      contract: apig/api-contract.yaml
      apigConfig: apig/apig-config.yaml
      apigYaml: apig/openAPI.yaml
      detectedContract: apig/api-contract.detected.yaml
      importTarget:
        region: cn-north-4
        projectId: 25f40abeecb84d3e90731de258ca71ec # 真实华为云项目ID
        instanceId: 2c2f130914a342b2a937fb92c7c23bd8 #真实 APIG 实例 ID
        groupId: b0165579ab244aa69546b365e41a4ad3 # 真实 APIG 分组 ID
        apiMode: merge
        extendMode: merge
      tags:
        - package
        - openeuler
        - apig
